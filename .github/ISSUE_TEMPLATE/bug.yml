name: 🐛 Bug report
description: Reportar um bug ou comportamento inesperado
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Obrigado por reportar! Quanto mais contexto melhor.

  - type: textarea
    id: what
    attributes:
      label: O que aconteceu?
      description: Descrição clara e concisa do bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: O que era esperado?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Passos pra reproduzir
      placeholder: |
        1. Vai em '...'
        2. Clica em '....'
        3. Vê erro
    validations:
      required: true

  - type: input
    id: page
    attributes:
      label: Página afetada
      placeholder: ex. /pages/components/modal.html
    validations:
      required: false

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Outro
    validations:
      required: true

  - type: dropdown
    id: theme
    attributes:
      label: Tema
      options:
        - Light
        - Dark
        - Os dois
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Contexto adicional / screenshots
